<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101418" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mission Rules" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Mission Rules</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="rules-page">
    <main class="rules-shell">
      <header class="rules-header">
        <div>
          <h1>Mission Rules</h1>
          <p>Current rules for the local IRL game companion.</p>
        </div>
        <button id="rulesBackButton" class="rules-back" type="button">Back to Map</button>
      </header>

      <section id="rulesCards" class="rules-grid" aria-live="polite">
        <article class="rule-card">
          <h2>Loading Rules</h2>
          <p>Reading rules.md...</p>
        </article>
      </section>
    </main>

    <script src="pwa.js"></script>
    <script src="rules.js"></script>
  </body>
</html>
